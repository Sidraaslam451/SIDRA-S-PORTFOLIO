<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TEACHER</title>

    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", sans-serif;
      }

      body {
        background-color: #081b29;
        color: #0ef;
        padding: 40px;
      }

      .container {
        background-color: #000;
        padding: 30px;
        border-radius: 12px;
        box-shadow: 0 0 15px #0ef;
        max-width: 800px;
        margin: auto;
        text-align: center;
      }

      h1 {
        font-size: 1.5rem;
        margin-bottom: 25px;
        line-height: 1.6;
      }
    </style>
  </head>
  <body>
    <h1>
      "As a teacher, I enjoy explaining complex topics from Physics, Biology,
      Chemistry, and Computer Science in a simple and easy-to-understand way."
    </h1>
    <h1>
      "I love helping students build a strong foundation in science and
      technology, and I feel proud when they start understanding and enjoying
      the subjects."
    </h1>
  </body>
</html>
